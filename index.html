    // ============================================================================

    // ============================================================================

    const AMBER_CANDIDATES = {

        { id: 'apl-2', name: 'Global Spice Traders', article: '302847', pack: '1kg', cost: 84, lowerCost: true, chips: [{ label: 'Semantic fit', type: 'positive' }, { label: 'Lower cost', type: 'positive' }, { label: 'Different pack size', type: 'attention' }] },
        { id: 'apl-3', name: "Fleischmann's Yeast", article: '201456', pack: '500g', cost: 165, chips: [{ label: 'Semantic fit', type: 'neutral' }, { label: 'Pack size match', type: 'neutral' }, { label: 'New brand', type: 'attention' }] },

    const GREEN_CANDIDATES = {

    const BLUE_REPLACEMENTS = {

        { id: 'apl-b1', name: "Nature's Bliss", article: '402311', pack: '1L', cost: 180, topPick: true, chips: [{ label: 'Cold pressed', type: 'positive' }, { label: 'Pack match', type: 'positive' }] },

      ],

    };

    const INITIAL_TYPE_A = [
      { id: 'ta-001', mogName: 'Curry Leaves Fresh', mogId: 'mog-100', site: 'Mumbai MUM-PR-07', generic: 'Herbs', type: 'Elementary', detected: '04:12 IST · 16 Apr', reason: 'Chef confirms regular use. No corresponding APL in SAP/ODS.', status: 'pending', notes: [] },
      { id: 'ta-002', mogName: 'Turmeric Root Organic', mogId: 'mog-101', site: 'Nagpur NGP-MH-14', generic: 'Spices', type: 'Elementary', detected: '04:12 IST · 16 Apr', reason: 'Site-specific MOG. Procurement records show no organic variant being purchased.', status: 'pending', notes: [] },

      { id: 'tb-002', aplName: 'Premium Turmeric Powder', article: '887501', pack: '500g', cost: 220, brand: 'Premium', sites: ['Nagpur NGP-MH-14', 'Pune PUN-MH-08'], detected: '04:12 IST · 16 Apr', reason: 'Active in procurement at 2 sites. No MOG link.', status: 'pending', notes: [], lastUsed: 'Never' },

    const INITIAL_QUARANTINE = [
      { id: 'aq-001', aplName: 'Ashirwad Select', article: '503211', pack: '10kg', brand: 'Ashirwad', site: 'Mumbai MUM-PR-07', detected: '04:12 IST · 16 Apr', issues: [{ severity: 'critical', label: 'Missing Cost', detail: 'Required for recipe costing' }, { severity: 'warning', label: 'Incomplete Record', detail: 'Mandatory fields missing' }], status: 'pending', notes: [], blocksMOG: 'mog-014' },

      { id: 'aq-003', aplName: 'Premium Sugar', article: '503555', pack: '5kg', brand: 'Premium', site: 'Delhi DEL-NCR-03', detected: '04:12 IST · 16 Apr', issues: [{ severity: 'info', label: 'Description Field Empty', detail: 'Cosmetic only — safe to use' }], status: 'reviewed', notes: [] },

    // ============================================================================
    // SHARED COMPONENTS
    // ============================================================================
    const QueueTag = ({ queue, children, size = 'sm' }) => {
      const styles = { green: { bg: '#EAF3DE', text: '#173404' }, amber: { bg: '#FAEEDA', text: '#412402' }, red: { bg: '#FCEBEB', text: '#501313' }, blue: { bg: '#E6F1FB', text: '#042C53' }, purple: { bg: '#EEEDFE', text: '#26215C' }, neutral: { bg: '#F1EFE8', text: '#2C2C2A' } };

      return <span style={{ fontSize: size === 'xs' ? '10px' : '11px', padding: size === 'xs' ? '2px 6px' : '3px 8px', background: s.bg, color: s.text, borderRadius: '4px', letterSpacing: '0.4px', fontWeight: 500, display: 'inline-flex', alignItems: 'center', gap: '4px' }}>{children}</span>;
    };

    const Chip = ({ type, children }) => {
      const colors = { positive: { bg: 'rgba(59,109,17,0.12)', text: '#173404' }, attention: { bg: 'rgba(186,117,23,0.18)', text: '#633806' }, critical: { bg: 'rgba(228,75,74,0.15)', text: '#791F1F' }, neutral: { bg: '#F1EFE8', text: '#5F5E5A' } };

      return <span style={{ fontSize: '11px', padding: '2px 7px', background: c.bg, color: c.text, borderRadius: '3px', whiteSpace: 'nowrap' }}>{children}</span>;
    };

    const Button = ({ variant = 'secondary', size = 'md', children, onClick, disabled, fullWidth }) => {
      const baseStyle = { border: 'none', borderRadius: '6px', cursor: disabled ? 'not-allowed' : 'pointer', fontWeight: 500, opacity: disabled ? 0.5 : 1, display: 'inline-flex', alignItems: 'center', gap: '6px', justifyContent: 'center', width: fullWidth ? '100%' : 'auto' };

      const sizes = { sm: { fontSize: '11px', padding: '5px 10px' }, md: { fontSize: '12px', padding: '7px 12px' }, lg: { fontSize: '13px', padding: '9px 16px' } };
      return <button onClick={onClick} disabled={disabled} style={{ ...baseStyle, ...variants[variant], ...sizes[size] }}>{children}</button>;
    };

    const SeverityBadge = ({ severity }) => {
      const styles = { critical: { bg: '#FCEBEB', text: '#791F1F', label: 'CRITICAL' }, warning: { bg: '#FAEEDA', text: '#633806', label: 'WARNING' }, info: { bg: '#E6F1FB', text: '#0C447C', label: 'INFO' } };
      const s = styles[severity];
      return <span style={{ fontSize: '9px', padding: '2px 6px', background: s.bg, color: s.text, borderRadius: '3px', letterSpacing: '0.4px', fontWeight: 500 }}>{s.label}</span>;
    };

    // ============================================================================
    // NAV
    // ============================================================================
    const NavSidebar = ({ active, onNavigate, myTasksCount, exceptionsCount }) => {
      const items = [
        { id: 'dashboard', label: 'Dashboard', icon: IconDashboard },
        { id: 'queue', label: 'Queue List', icon: IconList },
        { id: 'tasks', label: 'My Tasks', icon: IconClipboard, badge: myTasksCount },
        { id: 'exceptions', label: 'Exceptions', icon: IconShield, badge: exceptionsCount, badgeColor: '#A32D2D' },

      ];

        <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px 10px', height: 'fit-content' }}>

          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
            {items.map(item => {
              const I = item.icon;
              const isActive = active === item.id;
              return (
                <div key={item.id} onClick={() => onNavigate(item.id)} style={{ padding: '8px 10px', fontSize: '13px', background: isActive ? '#F1EFE8' : 'transparent', borderRadius: '6px', fontWeight: isActive ? 500 : 400, color: isActive ? '#2C2C2A' : '#5F5E5A', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'space-between' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: '10px' }}><I size={14} />{item.label}</span>

              );
            })}
          </div>
          <div style={{ marginTop: '20px', paddingTop: '16px', borderTop: '0.5px solid rgba(0,0,0,0.08)', display: 'flex', alignItems: 'center', gap: '6px', fontSize: '11px', color: '#639922', paddingLeft: '6px' }}>
            <IconWifi size={12} />ODS Connected
          </div>
        </div>

    // ============================================================================
    // QUEUE LIST + DETAILS
    // ============================================================================
    const QueueList = ({ mogs, activeTab, onTabChange, selectedMogId, onSelectMog, taskDraftState }) => {
      const counts = { amber: mogs.filter(m => m.queue === 'amber').length, green: mogs.filter(m => m.queue === 'green').length, red: mogs.filter(m => m.queue === 'red').length, blue: mogs.filter(m => m.queue === 'blue').length };

      const filtered = mogs.filter(m => m.queue === activeTab);
      return (
        <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '12px 10px', height: 'fit-content' }}>
          <p style={{ fontSize: '13px', fontWeight: 500, margin: '0 0 10px', color: '#2C2C2A' }}>Queue List</p>

              <div key={t.id} onClick={() => onTabChange(t.id)} style={{ cursor: 'pointer', padding: '5px 8px', background: activeTab === t.id ? (t.id === 'amber' ? '#FAEEDA' : t.id === 'green' ? '#EAF3DE' : t.id === 'red' ? '#FCEBEB' : '#E6F1FB') : 'transparent', borderRadius: '10px', fontSize: '11px', fontWeight: 500, color: activeTab === t.id ? (t.id === 'amber' ? '#412402' : t.id === 'green' ? '#173404' : t.id === 'red' ? '#501313' : '#042C53') : '#5F5E5A' }}>{t.label} {counts[t.id]}</div>

          <div style={{ display: 'flex', flexDirection: 'column', maxHeight: '600px', overflowY: 'auto' }}>
            {filtered.length === 0 && <p style={{ fontSize: '11px', color: '#888780', padding: '20px 8px', textAlign: 'center' }}>No items</p>}

              const isSelected = selectedMogId === mog.id;
              const tabColor = activeTab === 'amber' ? '#EF9F27' : activeTab === 'green' ? '#639922' : activeTab === 'red' ? '#E24B4A' : '#378ADD';

                  <p style={{ fontSize: '18px', fontWeight: 500, margin: 0 }}>{exception.aplName}</p>
                  <QueueTag queue="purple" size="xs">MAM EXCEPTION · TYPE B</QueueTag>
                </div>
                <p style={{ fontSize: '12px', color: '#5F5E5A', margin: 0 }}>Article {exception.article} · {exception.brand} · {exception.pack} · ₹{exception.cost}.00</p>
                <p style={{ fontSize: '11px', color: '#888780', margin: '4px 0 0' }}>Active at: {exception.sites.join(', ')}</p>
              </div>
              <Button variant="ghost" size="sm"><IconHistory size={12} /> History</Button>
            </div>
            <div style={{ marginTop: '12px', padding: '10px 12px', background: '#EEEDFE', borderRadius: '6px' }}>
              <p style={{ fontSize: '10px', color: '#3C3489', margin: '0 0 4px', letterSpacing: '0.4px', fontWeight: 500 }}>ⓘ ORPHAN APL · {exception.detected}</p>
              <p style={{ fontSize: '12px', color: '#26215C', margin: 0, lineHeight: 1.5 }}>{exception.reason}</p>
            </div>
            {exception.lastUsed !== 'Never' && <div style={{ marginTop: '8px', padding: '8px 10px', background: '#FAEEDA', borderRadius: '4px', fontSize: '11px', color: '#633806' }}>⚠ This APL was linked {exception.lastUsed}. Retiring may affect historical recipe costs.</div>}
          </div>

          <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '16px 18px', marginBottom: '12px' }}>
            <p style={{ fontSize: '13px', fontWeight: 500, margin: '0 0 4px' }}>Link to existing MOG</p>
            <p style={{ fontSize: '11px', color: '#888780', margin: '0 0 12px' }}>Find the MOG that should reference this APL.</p>
            <div style={{ position: 'relative', marginBottom: '10px' }}>
              <span style={{ position: 'absolute', left: '10px', top: '50%', transform: 'translateY(-50%)', color: '#888780' }}><IconSearch size={14} /></span>
              <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search MOG by name..." style={{ width: '100%', fontSize: '12px', padding: '8px 10px 8px 32px', border: '0.5px solid #D3D1C7', borderRadius: '6px' }} />
            </div>
            {mockMOGResults.length > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '4px', marginTop: '8px' }}>
                {mockMOGResults.map(r => (
                  <div key={r.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 10px', background: '#F1EFE8', borderRadius: '4px' }}>
                    <p style={{ fontSize: '12px', fontWeight: 500, margin: 0 }}>{r.name}</p>
                    <Button variant="primary" size="sm" onClick={() => onLinkMOG(exception, r)}>Link</Button>
                  </div>
                ))}
              </div>
            )}

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px', marginBottom: '12px' }}>
            <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}><span style={{ color: '#3B6D11' }}><IconPlus size={14} /></span><p style={{ fontSize: '13px', fontWeight: 500, margin: 0 }}>Create new MOG</p></div>
              <p style={{ fontSize: '11px', color: '#888780', margin: '0 0 10px', lineHeight: 1.5 }}>Redirects to Culinary Team for MOG creation.</p>
              <Button variant="secondary" size="sm" onClick={() => setShowCreateMOGModal(true)} fullWidth>Request MOG</Button>
            </div>
            <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}><span style={{ color: '#A32D2D' }}><IconTrash size={14} /></span><p style={{ fontSize: '13px', fontWeight: 500, margin: 0 }}>Retire APL</p></div>
              <p style={{ fontSize: '11px', color: '#888780', margin: '0 0 10px', lineHeight: 1.5 }}>Remove from active procurement.</p>
              <Button variant="danger" size="sm" onClick={() => setShowRetireModal(true)} fullWidth>Retire</Button>
            </div>
            <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}><span style={{ color: '#A32D2D' }}><IconSend size={14} /></span><p style={{ fontSize: '13px', fontWeight: 500, margin: 0 }}>Escalate</p></div>
              <p style={{ fontSize: '11px', color: '#888780', margin: '0 0 10px', lineHeight: 1.5 }}>Send to Procurement Team.</p>
              <Button variant="secondary" size="sm" onClick={() => setShowEscalateModal(true)} fullWidth>Raise request</Button>
            </div>
          </div>

          <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px 16px' }}>
            <p style={{ fontSize: '12px', fontWeight: 500, margin: '0 0 8px' }}>Internal notes ({exception.notes.length})</p>
            {exception.notes.map((n, i) => (
              <div key={i} style={{ padding: '8px 10px', background: '#F1EFE8', borderRadius: '4px', marginBottom: '6px' }}>
                <p style={{ fontSize: '11px', margin: '0 0 2px' }}>{n.text}</p>
                <p style={{ fontSize: '10px', margin: 0, color: '#888780' }}>{n.author} · {n.time}</p>
              </div>
            ))}
            <textarea value={noteInput} onChange={e => setNoteInput(e.target.value)} placeholder="Add a note..." style={{ width: '100%', fontSize: '12px', padding: '8px', border: '0.5px solid #D3D1C7', borderRadius: '4px', resize: 'vertical', minHeight: '50px' }} />
            <div style={{ marginTop: '8px', display: 'flex', justifyContent: 'flex-end' }}>
              <Button variant="secondary" size="sm" onClick={() => { if (noteInput.trim()) { onAddNote(exception, noteInput); setNoteInput(''); } }} disabled={!noteInput.trim()}>Add note</Button>
            </div>
          </div>

          {showRetireModal && <RetireAPLModal exception={exception} onClose={() => setShowRetireModal(false)} onSubmit={(reason) => { onRetire(exception, reason); setShowRetireModal(false); }} />}
          {showCreateMOGModal && <CreateMOGModal exception={exception} onClose={() => setShowCreateMOGModal(false)} onSubmit={() => { onCreateMOG(exception); setShowCreateMOGModal(false); }} />}
          {showEscalateModal && <EscalateModal exception={exception} onClose={() => setShowEscalateModal(false)} onSubmit={(reason) => { onEscalate(exception, reason); setShowEscalateModal(false); }} typeB />}
        </div>
      );
    };

    // ============================================================================
    // EXCEPTIONS — Quarantine
    // ============================================================================
    const QuarantineDetail = ({ item, onRefresh, onRaiseFix, onMarkReviewed, onMarkResolved, onAddNote }) => {
      const [noteInput, setNoteInput] = useState('');
      const [showFixModal, setShowFixModal] = useState(false);
      const [showResolveModal, setShowResolveModal] = useState(false);
      const hasCritical = item.issues.some(i => i.severity === 'critical');
      return (
        <div>
          <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '16px 18px', marginBottom: '12px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px', flexWrap: 'wrap' }}>
                  <p style={{ fontSize: '18px', fontWeight: 500, margin: 0 }}>{item.aplName}</p>
                  <QueueTag queue="amber" size="xs">QUARANTINED</QueueTag>
                  {item.status === 'reviewed' && <QueueTag queue="neutral" size="xs">REVIEWED</QueueTag>}
                </div>
                <p style={{ fontSize: '12px', color: '#5F5E5A', margin: 0 }}>Article {item.article} · {item.brand} · {item.pack} · {item.site}</p>
              </div>
              <Button variant="ghost" size="sm"><IconHistory size={12} /> History</Button>
            </div>
            <div style={{ marginTop: '12px', padding: '10px 12px', background: '#FAEEDA', borderRadius: '6px' }}>
              <p style={{ fontSize: '10px', color: '#633806', margin: '0 0 4px', letterSpacing: '0.4px', fontWeight: 500 }}>⚠ INVALID OR INCOMPLETE DATA · {item.detected}</p>
              <p style={{ fontSize: '12px', color: '#412402', margin: 0, lineHeight: 1.5 }}>This record has missing or invalid mandatory fields in SAP/ODS. It cannot be used for mapping until corrected.</p>
            </div>
          </div>

          {item.blocksMOG && (
            <div style={{ background: '#E6F1FB', border: '0.5px solid #378ADD', borderRadius: '6px', padding: '12px 14px', marginBottom: '12px', display: 'flex', gap: '10px', alignItems: 'flex-start' }}>
              <span style={{ marginTop: '2px', color: '#0C447C' }}><IconInfo size={14} /></span>
              <div>
                <p style={{ fontSize: '12px', fontWeight: 500, margin: '0 0 3px', color: '#042C53' }}>This APL is blocking a Blue queue replacement</p>
                <p style={{ fontSize: '11px', color: '#0C447C', margin: 0, lineHeight: 1.5 }}>MOG "Whole Wheat Flour" needs this APL as a replacement candidate. Resolving here will unblock that transition.</p>
              </div>
            </div>
          )}

          <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px 16px', marginBottom: '12px' }}>
            <p style={{ fontSize: '12px', fontWeight: 500, margin: '0 0 10px' }}>Data issues detected ({item.issues.length})</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
              {item.issues.map((issue, i) => (
                <div key={i} style={{ padding: '10px 12px', background: '#F1EFE8', borderRadius: '4px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px' }}>
                  <div>
                    <p style={{ fontSize: '12px', fontWeight: 500, margin: '0 0 2px' }}>{issue.label}</p>
                    <p style={{ fontSize: '11px', color: '#5F5E5A', margin: 0 }}>{issue.detail}</p>
                  </div>
                  <SeverityBadge severity={issue.severity} />
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '12px' }}>
            <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}><span style={{ color: '#185FA5' }}><IconRefresh size={14} /></span><p style={{ fontSize: '13px', fontWeight: 500, margin: 0 }}>Refresh from SAP</p></div>
              <p style={{ fontSize: '11px', color: '#888780', margin: '0 0 10px', lineHeight: 1.5 }}>Check if this record has been corrected.</p>
              <Button variant="secondary" size="sm" onClick={() => onRefresh(item)} fullWidth>Refresh now</Button>
            </div>
            <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}><span style={{ color: '#A32D2D' }}><IconSend size={14} /></span><p style={{ fontSize: '13px', fontWeight: 500, margin: 0 }}>Raise data fix request</p></div>
              <p style={{ fontSize: '11px', color: '#888780', margin: '0 0 10px', lineHeight: 1.5 }}>Send to SAP/ODS Data Team.</p>
              <Button variant="danger" size="sm" onClick={() => setShowFixModal(true)} fullWidth>Raise request</Button>
            </div>
          </div>

          <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '14px 16px', marginBottom: '12px' }}>
            <p style={{ fontSize: '12px', fontWeight: 500, margin: '0 0 8px' }}>Internal notes ({item.notes.length})</p>
            {item.notes.map((n, i) => (
              <div key={i} style={{ padding: '8px 10px', background: '#F1EFE8', borderRadius: '4px', marginBottom: '6px' }}>
                <p style={{ fontSize: '11px', margin: '0 0 2px' }}>{n.text}</p>
                <p style={{ fontSize: '10px', margin: 0, color: '#888780' }}>{n.author} · {n.time}</p>
              </div>
            ))}
            <textarea value={noteInput} onChange={e => setNoteInput(e.target.value)} placeholder="Add a note..." style={{ width: '100%', fontSize: '12px', padding: '8px', border: '0.5px solid #D3D1C7', borderRadius: '4px', resize: 'vertical', minHeight: '50px' }} />
            <div style={{ marginTop: '8px', display: 'flex', justifyContent: 'flex-end' }}>
              <Button variant="secondary" size="sm" onClick={() => { if (noteInput.trim()) { onAddNote(item, noteInput); setNoteInput(''); } }} disabled={!noteInput.trim()}>Add note</Button>
            </div>
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '8px' }}>
            <p style={{ fontSize: '11px', color: '#888780', margin: 0 }}>Resolution status: <span style={{ color: item.status === 'pending' ? '#633806' : '#5F5E5A', fontWeight: 500, textTransform: 'capitalize' }}>{item.status}</span></p>
            <div style={{ display: 'flex', gap: '6px' }}>
              {item.status === 'pending' && <Button variant="secondary" size="sm" onClick={() => onMarkReviewed(item)}>Mark as reviewed</Button>}
              <Button variant="primary" size="sm" disabled={hasCritical} onClick={() => setShowResolveModal(true)}>{hasCritical ? 'Cannot resolve (critical)' : 'Mark resolved'}</Button>
            </div>
          </div>

          {showFixModal && <RaiseFixModal item={item} onClose={() => setShowFixModal(false)} onSubmit={(desc) => { onRaiseFix(item, desc); setShowFixModal(false); }} />}
          {showResolveModal && <ResolveQuarantineModal item={item} onClose={() => setShowResolveModal(false)} onSubmit={(reason) => { onMarkResolved(item, reason); setShowResolveModal(false); }} />}
        </div>
      );
    };

    // ============================================================================
    // MY TASKS
    // ============================================================================
    const MyTasks = ({ tasks, onOpenTask }) => {
      const [filter, setFilter] = useState('all');
      const counts = { all: tasks.length, green: tasks.filter(t => t.sourceQueue === 'green').length, amber: tasks.filter(t => t.sourceQueue === 'amber').length, blue: tasks.filter(t => t.sourceQueue === 'blue').length, escalated: tasks.filter(t => t.type === 'escalation').length };
      const filtered = filter === 'all' ? tasks : filter === 'escalated' ? tasks.filter(t => t.type === 'escalation') : tasks.filter(t => t.sourceQueue === filter);
      return (
        <div>
          <div style={{ marginBottom: '16px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '4px' }}>
              <p style={{ fontSize: '20px', fontWeight: 500, margin: 0 }}>My Tasks</p>
              <p style={{ fontSize: '11px', color: '#888780', margin: 0 }}>ODS synced 04:12 IST · 16 Apr</p>
            </div>
            <p style={{ fontSize: '12px', color: '#5F5E5A', margin: 0 }}>Mappings you've confirmed. Enter each in CookBook, then mark as done.</p>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '8px', marginBottom: '14px' }}>
            {[{ label: 'From Green', count: counts.green, color: '#639922' }, { label: 'From Amber', count: counts.amber, color: '#EF9F27' }, { label: 'From Blue', count: counts.blue, color: '#378ADD' }, { label: 'Escalations', count: counts.escalated, color: '#E24B4A' }].map((s, i) => (
              <div key={i} style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', padding: '10px 12px', borderRadius: '6px' }}>
                <p style={{ fontSize: '11px', color: '#888780', margin: '0 0 4px' }}>{s.label}</p>
                <p style={{ fontSize: '18px', fontWeight: 500, margin: 0, color: s.color }}>{s.count}</p>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: '6px', marginBottom: '10px', flexWrap: 'wrap' }}>
            {[{ id: 'all', label: `All (${counts.all})` }, { id: 'green', label: `Green (${counts.green})` }, { id: 'amber', label: `Amber (${counts.amber})` }, { id: 'blue', label: `Blue (${counts.blue})` }, { id: 'escalated', label: `Escalated (${counts.escalated})` }].map(tab => (
              <button key={tab.id} onClick={() => setFilter(tab.id)} style={{ padding: '6px 10px', fontSize: '11px', background: filter === tab.id ? '#FFFFFF' : 'transparent', border: filter === tab.id ? '0.5px solid #2C2C2A' : '0.5px solid rgba(0,0,0,0.08)', borderRadius: '6px', cursor: 'pointer', fontWeight: filter === tab.id ? 500 : 400, color: filter === tab.id ? '#2C2C2A' : '#5F5E5A' }}>{tab.label}</button>
            ))}
          </div>
          {filtered.length === 0 ? (
            <div style={{ background: '#FFFFFF', border: '0.5px dashed rgba(0,0,0,0.15)', borderRadius: '8px', padding: '40px 20px', textAlign: 'center' }}>
              <p style={{ fontSize: '13px', color: '#888780', margin: '0 0 4px' }}>No tasks yet</p>
              <p style={{ fontSize: '11px', color: '#B4B2A9', margin: 0 }}>Confirm items from Queue List to see them here.</p>
            </div>
          ) : (
            <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', overflow: 'hidden' }}>
              {filtered.map((task, i) => {
                const borderColor = task.type === 'escalation' ? '#E24B4A' : task.sourceQueue === 'green' ? '#639922' : task.sourceQueue === 'amber' ? '#EF9F27' : '#378ADD';
                const isBlocked = task.type === 'escalation' || task.type === 'watch';
                return (
                  <div key={task.id} style={{ padding: '12px 14px', borderLeft: `3px solid ${borderColor}`, borderBottom: i < filtered.length - 1 ? '0.5px solid rgba(0,0,0,0.08)' : 'none', display: 'flex', gap: '12px', alignItems: 'flex-start' }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '3px', flexWrap: 'wrap' }}>
                        {task.type === 'escalation' ? <QueueTag queue="red" size="xs">MAM EXCEPTION · TYPE A</QueueTag> : task.type === 'watch' ? <QueueTag queue="blue" size="xs">BLUE · WATCH</QueueTag> : task.action === 'replace' ? <QueueTag queue="blue" size="xs">BLUE · REPLACE</QueueTag> : <QueueTag queue={task.sourceQueue} size="xs">{task.sourceQueue.toUpperCase()}</QueueTag>}
                        <p style={{ fontSize: '14px', fontWeight: 500, margin: 0 }}>{task.mogName}</p>
                        <span style={{ fontSize: '11px', color: '#888780' }}>· {task.site}</span>
                      </div>
                      <p style={{ fontSize: '12px', color: '#5F5E5A', margin: '0 0 4px' }}>
                        {task.type === 'escalation' ? 'No credible APL — escalated to Procurement Team · Awaiting resolution' :
                         task.type === 'watch' ? `${task.retiredAPL} retired · Transition planned — waiting for stock exhaustion` :
                         task.action === 'replace' ? <><span style={{ textDecoration: 'line-through', color: '#888780' }}>{task.retiredAPL}</span> → Link <span style={{ color: '#2C2C2A', fontWeight: 500 }}>{task.apls[0].name}</span> · Atomic swap</> :
                         <>Link <span style={{ color: '#2C2C2A', fontWeight: 500 }}>{task.apls.find(a => a.id === task.defaultId)?.name}</span> <span style={{ fontSize: '9px', padding: '1px 5px', background: '#2C2C2A', color: 'white', borderRadius: '3px' }}>DEFAULT</span>{task.apls.length > 1 && <> + <span style={{ color: '#2C2C2A', fontWeight: 500 }}>{task.apls.length - 1} more</span></>} · {task.sourceQueue === 'green' ? 'Autobot auto-matched' : 'You confirmed after review'}</>}
                      </p>
                      <p style={{ fontSize: '10px', color: '#888780', margin: 0 }}>{task.timestamp}</p>
                    </div>
                    <div style={{ display: 'flex', gap: '6px', flexShrink: 0 }}>
                      {isBlocked ? <Button variant="secondary" size="sm">{task.type === 'escalation' ? 'View thread' : 'Replace now'}</Button> : <><Button variant="secondary" size="sm"><IconCopy size={11} /> Copy</Button><Button variant="primary" size="sm" onClick={() => onOpenTask(task)}><IconCheck size={11} /> Done</Button></>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ============================================================================
    // EXCEPTIONS PAGE
    // ============================================================================
    const ExceptionsPage = ({ typeAList, typeBList, quarantineList, focusedItem, onFocusItem, ...handlers }) => {
      const [activeTab, setActiveTab] = useState(focusedItem?.tab || 'typeA');
      const [selectedId, setSelectedId] = useState(focusedItem?.id || typeAList[0]?.id);
      useEffect(() => { if (focusedItem) { setActiveTab(focusedItem.tab); setSelectedId(focusedItem.id); onFocusItem(null); } }, [focusedItem, onFocusItem]);
      const list = activeTab === 'typeA' ? typeAList : activeTab === 'typeB' ? typeBList : quarantineList;
      const selected = list.find(i => i.id === selectedId);
      const tabs = [{ id: 'typeA', label: 'MAM Type A', count: typeAList.length, sub: 'MOG without APL' }, { id: 'typeB', label: 'MAM Type B', count: typeBList.length, sub: 'Orphan APL' }, { id: 'quarantine', label: 'APL Quarantine', count: quarantineList.length, sub: 'Bad data' }];
      return (
        <div style={{ display: 'grid', gridTemplateColumns: '260px 1fr', gap: '12px' }}>
          <div style={{ background: '#FFFFFF', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: '8px', padding: '12px 10px', height: 'fit-content' }}>
            <p style={{ fontSize: '13px', fontWeight: 500, margin: '0 0 10px' }}>Exceptions</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px', marginBottom: '12px' }}>
              {tabs.map(t => (
                <div key={t.id} onClick={() => { setActiveTab(t.id); const firstItem = (t.id === 'typeA' ? typeAList : t.id === 'typeB' ? typeBList : quarantineList)[0]; if (firstItem) setSelectedId(firstItem.id); }} style={{ cursor: 'pointer', padding: '8px 10px', background: activeTab === t.id ? '#F1EFE8' : 'transparent', borderRadius: '6px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2px' }}>
                    <p style={{ fontSize: '12px', fontWeight: 500, margin: 0 }}>{t.label}</p>
                    <span style={{ fontSize: '11px', color: '#A32D2D', fontWeight: 500 }}>{t.count}</span>
                  </div>
                  <p style={{ fontSize: '10px', color: '#888780', margin: 0 }}>{t.sub}</p>
                </div>
              ))}
            </div>
            <div style={{ borderTop: '0.5px solid rgba(0,0,0,0.08)', paddingTop: '10px' }}>
              <div style={{ position: 'relative', marginBottom: '8px' }}>
                <span style={{ position: 'absolute', left: '8px', top: '50%', transform: 'translateY(-50%)', color: '#888780' }}><IconSearch size={12} /></span>
                <input placeholder="Search..." style={{ width: '100%', fontSize: '11px', padding: '6px 8px 6px 26px', border: '0.5px solid #D3D1C7', borderRadius: '4px' }} />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', maxHeight: '500px', overflowY: 'auto' }}>
                {list.map(item => {
                  const isSelected = selectedId === item.id;
                  const name = activeTab === 'typeA' ? item.mogName : item.aplName;
                  const subtext = activeTab === 'typeA' ? 'No matching APL found' : activeTab === 'typeB' ? `${item.brand} · ${item.pack}` : item.issues.map(i => i.label).join(', ');
                  return (
                    <div key={item.id} onClick={() => setSelectedId(item.id)} style={{ padding: '8px 10px', borderLeft: `2px solid ${isSelected ? (activeTab === 'typeA' ? '#E24B4A' : activeTab === 'typeB' ? '#7F77DD' : '#EF9F27') : 'transparent'}`, background: isSelected ? '#F1EFE8' : 'transparent', borderRadius: '0 4px 4px 0', marginBottom: '2px', cursor: 'pointer' }}>
                      <p style={{ fontSize: '12px', fontWeight: 500, margin: '0 0 2px' }}>{name}</p>
                      <p style={{ fontSize: '10px', color: '#888780', margin: '0 0 2px' }}>{activeTab === 'typeA' ? item.site : activeTab === 'typeB' ? `Article ${item.article}` : item.site}</p>
                      <p style={{ fontSize: '10px', color: '#888780', margin: 0 }}>{subtext}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          <div>
            {selected && activeTab === 'typeA' && <TypeADetail key={selected.id} exception={selected} allTypeB={typeBList} onResolve={handlers.onResolveTypeA} onEscalate={handlers.onEscalateTypeA} onCreateAPL={handlers.onCreateAPL} onAddNote={handlers.onAddNoteTypeA} onPairResolve={handlers.onPairResolve} onGoToTypeB={(id) => { setActiveTab('typeB'); setSelectedId(id); }} />}
            {selected && activeTab === 'typeB' && <TypeBDetail key={selected.id} exception={selected} onLinkMOG={handlers.onLinkMOG} onRetire={handlers.onRetireAPL} onCreateMOG={handlers.onCreateMOG} onEscalate={handlers.onEscalateTypeB} onAddNote={handlers.onAddNoteTypeB} />}
            {selected && activeTab === 'quarantine' && <QuarantineDetail key={selected.id} item={selected} onRefresh={handlers.onRefreshQuarantine} onRaiseFix={handlers.onRaiseFix} onMarkReviewed={handlers.onMarkReviewed} onMarkResolved={handlers.onMarkResolved} onAddNote={handlers.onAddNoteQuarantine} />}
            {!selected && <div style={{ background: '#FFFFFF', border: '0.5px dashed rgba(0,0,0,0.15)', borderRadius: '8px', padding: '60px 20px', textAlign: 'center' }}><p style={{ fontSize: '13px', color: '#888780', margin: 0 }}>No items in this category</p></div>}
          </div>
        </div>
      );
    };

    // ============================================================================
    // TOAST
    // ============================================================================
    const Toast = ({ message, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, [onClose]);
      return (
        <div style={{ position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)', background: '#2C2C2A', color: '#FFFFFF', padding: '10px 16px', borderRadius: '8px', fontSize: '13px', zIndex: 200, display: 'flex', alignItems: 'center', gap: '8px' }}>
          <span style={{ color: '#97C459' }}><IconCheck size={14} /></span>{message}
        </div>
      );
    };

    // ============================================================================
    // MAIN APP
    // ============================================================================
    function App() {
      const [mogs, setMogs] = useState(INITIAL_MOGS);
      const [activeView, setActiveView] = useState('queue');
      const [activeTab, setActiveTab] = useState('amber');
      const [selectedMogId, setSelectedMogId] = useState('mog-001');
      const [tasks, setTasks] = useState([{ id: 't-001', mogName: 'Whole Wheat Flour', site: 'Mumbai MUM-PR-07', sourceQueue: 'blue', type: 'watch', retiredAPL: 'Aashirvaad ₹48', timestamp: 'Planned 09:15 · No action needed until stock runs out' }]);
      const [draftSelections, setDraftSelections] = useState({});
      const [handoffTask, setHandoffTask] = useState(null);
      const [toast, setToast] = useState(null);
      const [typeAList, setTypeAList] = useState(INITIAL_TYPE_A);
      const [typeBList, setTypeBList] = useState(INITIAL_TYPE_B);
      const [quarantineList, setQuarantineList] = useState(INITIAL_QUARANTINE);
      const [focusedException, setFocusedException] = useState(null);
      const [reqCounter, setReqCounter] = useState(10240);

      const selectedMog = mogs.find(m => m.id === selectedMogId);
      const filteredMogs = mogs.filter(m => m.queue === activeTab);
      const exceptionsCount = typeAList.length + typeBList.length + quarantineList.length;

      useEffect(() => {
        if (!selectedMog || selectedMog.queue !== activeTab) {
          const first = mogs.find(m => m.queue === activeTab);
          if (first) setSelectedMogId(first.id);
        }
      }, [activeTab, mogs, selectedMog]);

      const moveToNext = (currentId) => { const next = filteredMogs.find(m => m.id !== currentId); if (next) setSelectedMogId(next.id); };
      const nextReqId = () => { const id = `REQ-${reqCounter}`; setReqCounter(reqCounter + 1); return id; };

      const handleConfirmMapping = (apls, defaultAPL) => {
        const newTask = { id: `t-${Date.now()}`, mogName: selectedMog.name, site: selectedMog.site, sourceQueue: selectedMog.queue, action: 'link', apls, defaultId: defaultAPL.id, timestamp: 'Confirmed just now' };
        setTasks([newTask, ...tasks]);
        const currentId = selectedMog.id;
        setMogs(mogs.filter(m => m.id !== currentId));
        moveToNext(currentId);
        setToast(`${selectedMog.name} confirmed → My Tasks`);
        const nd = { ...draftSelections }; delete nd[currentId]; setDraftSelections(nd);
      };

      const handleBlueReplace = (replacement) => {
        const newTask = { id: `t-${Date.now()}`, mogName: selectedMog.name, site: selectedMog.site, sourceQueue: 'blue', action: 'replace', retiredAPL: selectedMog.retiredAPL, apls: [{ ...replacement, article: replacement.article || '—' }], defaultId: replacement.id, timestamp: 'Confirmed just now' };
        setTasks([newTask, ...tasks]);
        const currentId = selectedMog.id;
        setMogs(mogs.filter(m => m.id !== currentId));
        moveToNext(currentId);
        setToast(`${selectedMog.name} queued for replacement → My Tasks`);
      };

      const handleBluePlanTransition = () => {
        const newTask = { id: `t-${Date.now()}`, mogName: selectedMog.name, site: selectedMog.site, sourceQueue: 'blue', type: 'watch', retiredAPL: selectedMog.retiredAPL, timestamp: 'Planned just now · No action needed until stock runs out' };
        setTasks([newTask, ...tasks]);
        const currentId = selectedMog.id;
        setMogs(mogs.filter(m => m.id !== currentId));
        moveToNext(currentId);
        setToast(`${selectedMog.name} added to Blue Watch`);
      };

      const handleRedEscalate = () => {
        const newTypeA = { id: `ta-${Date.now()}`, mogName: selectedMog.name, mogId: selectedMog.id, site: selectedMog.site, generic: selectedMog.generic, type: selectedMog.type, detected: 'Just now', reason: selectedMog.reasoning, status: 'escalated', reqId: nextReqId(), notes: [] };
        setTypeAList([newTypeA, ...typeAList]);
        const currentId = selectedMog.id;
        setMogs(mogs.filter(m => m.id !== currentId));
        moveToNext(currentId);
        setToast(`${selectedMog.name} escalated → Exceptions Type A`);
      };

      const handleRedManualResolve = (aplName) => {
        const fakeApl = { id: `apl-manual-${Date.now()}`, name: aplName, article: 'MANUAL', pack: '—', cost: 0 };
        const newTask = { id: `t-${Date.now()}`, mogName: selectedMog.name, site: selectedMog.site, sourceQueue: 'green', action: 'link', apls: [fakeApl], defaultId: fakeApl.id, timestamp: 'Manually resolved just now' };
        setTasks([newTask, ...tasks]);
        const currentId = selectedMog.id;
        setMogs(mogs.filter(m => m.id !== currentId));
        moveToNext(currentId);
        setToast(`${selectedMog.name} manually resolved → My Tasks`);
      };

      const handleResolveTypeA = (exc, apl) => {
        setTypeAList(typeAList.filter(t => t.id !== exc.id));
        const id = `apl-${Date.now()}`;
        const newTask = { id: `t-${Date.now()}`, mogName: exc.mogName, site: exc.site, sourceQueue: 'green', action: 'link', apls: [{ ...apl, id }], defaultId: id, timestamp: 'Resolved from Type A · Just now' };
        setTasks([newTask, ...tasks]);
        setToast(`${exc.mogName} resolved → My Tasks`);
      };

      const handleEscalateTypeA = (exc, reason) => {
        const id = nextReqId();
        setTypeAList(typeAList.map(t => t.id === exc.id ? { ...t, status: 'escalated', reqId: id, notes: [...t.notes, { author: 'Yashvi', text: `Escalated: ${reason}`, time: 'Just now' }] } : t));
        setToast(`Escalated to Procurement · ${id}`);
      };

      const handleCreateAPL = (exc, data) => {
        const id = nextReqId();
        setTypeAList(typeAList.map(t => t.id === exc.id ? { ...t, status: 'escalated', reqId: id, notes: [...t.notes, { author: 'Yashvi', text: `Requested APL creation: ${data.brand} · ${data.pack}`, time: 'Just now' }] } : t));
        setToast(`APL creation request sent to Procurement`);
      };

      const handlePairResolve = (typeA, typeB) => {
        setTypeAList(typeAList.filter(t => t.id !== typeA.id));
        setTypeBList(typeBList.filter(t => t.id !== typeB.id));
        const apl = { id: `apl-pair-${Date.now()}`, name: typeB.aplName, article: typeB.article, pack: typeB.pack, cost: typeB.cost };
        const newTask = { id: `t-${Date.now()}`, mogName: typeA.mogName, site: typeA.site, sourceQueue: 'green', action: 'link', apls: [apl], defaultId: apl.id, timestamp: 'Pair-resolved Type A + Type B · Just now' };
        setTasks([newTask, ...tasks]);
        setToast(`Pair-resolved: ${typeA.mogName} ↔ ${typeB.aplName}`);
      };

      const handleAddNoteTypeA = (exc, note) => setTypeAList(typeAList.map(t => t.id === exc.id ? { ...t, notes: [...t.notes, { author: 'Yashvi', text: note, time: 'Just now' }] } : t));
      const handleLinkMOG = (exc, mog) => {
        setTypeBList(typeBList.filter(t => t.id !== exc.id));
        const apl = { id: `apl-${Date.now()}`, name: exc.aplName, article: exc.article, pack: exc.pack, cost: exc.cost };
        const newTask = { id: `t-${Date.now()}`, mogName: mog.name, site: exc.sites[0], sourceQueue: 'green', action: 'link', apls: [apl], defaultId: apl.id, timestamp: 'Resolved from Type B · Just now' };
        setTasks([newTask, ...tasks]);
        setToast(`${exc.aplName} linked to ${mog.name}`);
      };
      const handleRetireAPL = (exc, reason) => { setTypeBList(typeBList.filter(t => t.id !== exc.id)); setToast(`${exc.aplName} retired · ${reason}`); };
      const handleCreateMOG = (exc) => { setTypeBList(typeBList.map(t => t.id === exc.id ? { ...t, notes: [...t.notes, { author: 'Yashvi', text: 'Sent MOG creation request to Culinary Team', time: 'Just now' }] } : t)); setToast(`MOG creation request sent to Culinary`); };
      const handleEscalateTypeB = (exc, reason) => { setTypeBList(typeBList.map(t => t.id === exc.id ? { ...t, notes: [...t.notes, { author: 'Yashvi', text: `Escalated: ${reason}`, time: 'Just now' }] } : t)); setToast(`Escalated to Procurement · ${nextReqId()}`); };
      const handleAddNoteTypeB = (exc, note) => setTypeBList(typeBList.map(t => t.id === exc.id ? { ...t, notes: [...t.notes, { author: 'Yashvi', text: note, time: 'Just now' }] } : t));
      const handleRefreshQuarantine = (item) => setToast(`Refreshed from SAP · ${item.aplName} still has issues`);
      const handleRaiseFix = (item, desc) => { setQuarantineList(quarantineList.map(q => q.id === item.id ? { ...q, notes: [...q.notes, { author: 'Yashvi', text: `Data fix request raised. ${desc}`, time: 'Just now' }] } : q)); setToast(`Data fix request sent to SAP team · ${nextReqId()}`); };
      const handleMarkReviewed = (item) => { setQuarantineList(quarantineList.map(q => q.id === item.id ? { ...q, status: 'reviewed' } : q)); setToast(`${item.aplName} marked as reviewed`); };
      const handleMarkResolved = (item, reason) => { setQuarantineList(quarantineList.filter(q => q.id !== item.id)); setToast(`${item.aplName} resolved · re-routing to mapping pipeline`); };
      const handleAddNoteQuarantine = (item, note) => setQuarantineList(quarantineList.map(q => q.id === item.id ? { ...q, notes: [...q.notes, { author: 'Yashvi', text: note, time: 'Just now' }] } : q));
      const handleGoToQuarantine = () => { setActiveView('exceptions'); setFocusedException({ tab: 'quarantine', id: 'aq-001' }); };
      const handleTaskComplete = () => { setTasks(tasks.filter(t => t.id !== handoffTask.id)); setToast(`${handoffTask.mogName} marked as mapped · Dashboard updated`); setHandoffTask(null); };

      return (
        <div style={{ background: '#F8F6F0', minHeight: '100vh', padding: '16px' }}>
          <div style={{ maxWidth: '1280px', margin: '0 auto' }}>
            <div style={{ display: 'grid', gridTemplateColumns: activeView === 'queue' ? '160px 240px 1fr' : '160px 1fr', gap: '12px', alignItems: 'start' }}>
              <NavSidebar active={activeView} onNavigate={setActiveView} myTasksCount={tasks.length} exceptionsCount={exceptionsCount} />
              {activeView === 'queue' && (
                <>
                  <QueueList mogs={mogs} activeTab={activeTab} onTabChange={setActiveTab} selectedMogId={selectedMogId} onSelectMog={setSelectedMogId} taskDraftState={draftSelections} />
                  <div>
                    {selectedMog && selectedMog.queue === 'amber' && <AmberDetail key={selectedMog.id} mog={selectedMog} onConfirm={handleConfirmMapping} onSendToRed={() => { setMogs(mogs.map(m => m.id === selectedMog.id ? { ...m, queue: 'red' } : m)); setToast(`${selectedMog.name} sent to Red queue`); }} onFlagException={handleRedEscalate} draftSelections={draftSelections[selectedMog.id]} onDraftChange={(state) => setDraftSelections({ ...draftSelections, [selectedMog.id]: state })} />}
                    {selectedMog && selectedMog.queue === 'green' && <GreenDetail key={selectedMog.id} mog={selectedMog} onConfirm={handleConfirmMapping} onReject={() => { setMogs(mogs.map(m => m.id === selectedMog.id ? { ...m, queue: 'amber' } : m)); setToast(`${selectedMog.name} sent back to Amber for review`); }} />}
                    {selectedMog && selectedMog.queue === 'red' && <RedDetail key={selectedMog.id} mog={selectedMog} onEscalate={handleRedEscalate} onResolveManually={handleRedManualResolve} />}
                    {selectedMog && selectedMog.queue === 'blue' && <BlueDetail key={selectedMog.id} mog={selectedMog} onReplace={handleBlueReplace} onPlanTransition={handleBluePlanTransition} onGoToQuarantine={handleGoToQuarantine} />}
                    {!selectedMog && <div style={{ background: '#FFFFFF', border: '0.5px dashed rgba(0,0,0,0.15)', borderRadius: '8px', padding: '60px 20px', textAlign: 'center' }}><p style={{ fontSize: '14px', color: '#888780', margin: '0 0 4px' }}>No items in this queue</p></div>}
                  </div>
                </>
              )}
              {activeView === 'tasks' && <MyTasks tasks={tasks} onOpenTask={setHandoffTask} />}
              {activeView === 'exceptions' && <ExceptionsPage typeAList={typeAList} typeBList={typeBList} quarantineList={quarantineList} focusedItem={focusedException} onFocusItem={setFocusedException} onResolveTypeA={handleResolveTypeA} onEscalateTypeA={handleEscalateTypeA} onCreateAPL={handleCreateAPL} onAddNoteTypeA={handleAddNoteTypeA} onPairResolve={handlePairResolve} onLinkMOG={handleLinkMOG} onRetireAPL={handleRetireAPL} onCreateMOG={handleCreateMOG} onEscalateTypeB={handleEscalateTypeB} onAddNoteTypeB={handleAddNoteTypeB} onRefreshQuarantine={handleRefreshQuarantine} onRaiseFix={handleRaiseFix} onMarkReviewed={handleMarkReviewed} onMarkResolved={handleMarkResolved} onAddNoteQuarantine={handleAddNoteQuarantine} />}
              {activeView === 'dashboard' && <div style={{ background: '#FFFFFF', border: '0.5px dashed rgba(0,0,0,0.15)', borderRadius: '8px', padding: '60px 20px', textAlign: 'center' }}><p style={{ fontSize: '14px', color: '#888780', margin: '0 0 4px' }}>Dashboard — coming next</p><p style={{ fontSize: '12px', color: '#B4B2A9', margin: 0 }}>Original vs Incremental workload, Target Date tracking, Blue Watch list.</p></div>}
              {activeView === 'history' && <div style={{ background: '#FFFFFF', border: '0.5px dashed rgba(0,0,0,0.15)', borderRadius: '8px', padding: '60px 20px', textAlign: 'center' }}><p style={{ fontSize: '14px', color: '#888780', margin: '0 0 4px' }}>History — audit trail</p></div>}
            </div>
          </div>
          {handoffTask && <HandoffModal task={handoffTask} onClose={() => setHandoffTask(null)} onComplete={handleTaskComplete} />}
          {toast && <Toast message={toast} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
